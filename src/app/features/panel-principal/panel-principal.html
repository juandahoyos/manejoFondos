<app-toast />

<div class="min-h-screen bg-gray-50 text-gray-900 font-sans selection:bg-blue-100">
  
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-30" aria-label="Navegación principal">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 bg-blue-700 rounded flex items-center justify-center" aria-hidden="true">
            <span class="text-white font-bold text-sm">BTG</span>
          </div>
          <span class="font-bold text-xl tracking-tight text-blue-900">
            Pactual<span class="font-light text-gray-500 ml-1">Fondos</span>
          </span>
        </div>
        
        @if (estadoUsuario$ | async; as estado) {
          <div class="flex flex-col items-end">
            <span class="text-xs font-medium text-gray-500 uppercase tracking-wider">Saldo Disponible</span>
            <span class="text-xl sm:text-2xl font-bold text-green-600" aria-live="polite">
              {{ estado.saldo | currency:'COP':'symbol-narrow':'1.0-0' }}
            </span>
          </div>
        }
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      
      <section class="lg:col-span-7" aria-label="Lista de fondos disponibles">
        <app-lista-fondos />
      </section>
      
      <section class="lg:col-span-5" aria-label="Historial de transacciones">
        <app-historial />
      </section>

    </div>
  </main>
</div>
